document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  <script type="__bundler/template">
"<!DOCTYPE html>\n<html><head>\n<meta charset=\"utf-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1\">\n<script src=\"43749c28-a70c-4f08-a7c4-9b593d2507c8\"><\u002Fscript>\n\n<\u002Fhead>\n<body>\n<x-dc>\n<helmet>\n  <style>/* ============================================================\n   MLE Path — Webfonts\n   Avenir Next, supplied as TTF. We have four cuts:\n   Regular (400), Medium (500), DemiBold (600), Italic (400i).\n   NOTE: no true Heavy/Black cut was supplied — 600 (DemiBold)\n   is the heaviest real weight. Display type uses 600; if a\n   licensed Avenir Next Heavy becomes available, add it at 800.\n   ============================================================ */\n\n@font-face {\n  font-family: \"Avenir Next\";\n  src: url(\"b81f7298-8cfe-4ecd-84ee-86f179d21e24\") format(\"truetype\");\n  font-weight: 400;\n  font-style: normal;\n  font-display: swap;\n}\n\n@font-face {\n  font-family: \"Avenir Next\";\n  src: url(\"d3a85afc-a5aa-44e1-a0c4-abccd3035036\") format(\"truetype\");\n  font-weight: 400;\n  font-style: italic;\n  font-display: swap;\n}\n\n@font-face {\n  font-family: \"Avenir Next\";\n  src: url(\"54d992e2-19b7-46c7-9c29-d946d2aec2d6\") format(\"truetype\");\n  font-weight: 500;\n  font-style: normal;\n  font-display: swap;\n}\n\n@font-face {\n  font-family: \"Avenir Next\";\n  src: url(\"4970e2d0-bad4-486e-8843-f76f76d8ef2d\") format(\"truetype\");\n  font-weight: 600;\n  font-style: normal;\n  font-display: swap;\n}\n\n/* DemiBold also answers requests for 700/800 so display type stays\n   on-brand instead of falling back to the system stack. The browser\n   may synth-bolden slightly; replace with a real Heavy cut when licensed. */\n@font-face {\n  font-family: \"Avenir Next\";\n  src: url(\"4970e2d0-bad4-486e-8843-f76f76d8ef2d\") format(\"truetype\");\n  font-weight: 700 800;\n  font-style: normal;\n  font-display: swap;\n}\n<\u002Fstyle>\n  <style>/* ============================================================\n   MLE Path — Color\n   Three electric accents on a quiet, paper-like field.\n   The three accents are one value cycled through the RGB\n   channels: 0a78f5 -> f50a78 -> 78f50a. Systematic underneath,\n   playful on the surface.\n   ============================================================ */\n\n:root {\n  /* ---- Brand accents (base) ---- */\n  --blue-500: #0a78f5;   /* Path Blue   — primary, links, the mark */\n  --pink-500: #f50a78;   /* Signal Pink — emphasis, don'ts, alerts */\n  --green-500: #78f50a;  /* Launch Green — success, CTAs on dark only */\n\n  /* Path Blue — interaction ramp */\n  --blue-50:  #eaf3fe;\n  --blue-100: #d3e7fd;\n  --blue-200: #a7cffb;\n  --blue-400: #2f8df6;\n  --blue-600: #0869d6;   /* hover */\n  --blue-700: #075cbd;   /* pressed */\n  --blue-900: #06337a;\n\n  /* Signal Pink — ramp */\n  --pink-50:  #fde7f1;\n  --pink-100: #fbd0e4;\n  --pink-600: #d6086a;\n  --pink-700: #b3075a;\n\n  /* Launch Green — ramp (lives on dark) */\n  --green-200: #cdf9a6;\n  --green-600: #5fc308;\n  --green-700: #4a9906;\n\n  /* ---- Neutrals ---- */\n  --ivory:      #fffff0;   /* paper / page background */\n  --white:      #ffffff;   /* card surface */\n  --silver:     #d3d3d3;   /* rules, borders, dividers */\n  --silver-soft:#ecece0;   /* inner dividers on paper */\n  --graphite:   #4f4f4f;   /* body text, icons */\n  --ink-700:    #222222;   /* headings */\n  --ink-muted:  #8a8a80;   /* captions, muted, meta */\n  --black:      #0b0b0b;   /* logo field, dark surfaces */\n  --graphite-900:#1c1c1c;  /* dark-surface chips/cards */\n\n  /* ---- Semantic aliases ---- */\n  --text-body:        var(--graphite);\n  --text-heading:     var(--ink-700);\n  --text-muted:       var(--ink-muted);\n  --text-link:        var(--blue-500);\n  --text-on-dark:     var(--ivory);\n  --text-on-dark-mut: #b9b9ae;\n\n  --surface-page:     var(--ivory);\n  --surface-card:     var(--white);\n  --surface-dark:     var(--black);\n  --surface-sunken:   #faf9ec;\n  --surface-tint:     var(--blue-50);\n\n  --border-default:   var(--silver);\n  --border-soft:      var(--silver-soft);\n  --border-strong:    var(--graphite);\n\n  --accent-primary:   var(--blue-500);\n  --accent-emphasis:  var(--pink-500);\n  --accent-success:   var(--green-500);\n\n  --focus-ring:       var(--blue-400);\n\n  /* States */\n  --primary-hover:    var(--blue-600);\n  --primary-press:    var(--blue-700);\n}\n<\u002Fstyle>\n  <style>/* ============================================================\n   MLE Path — Typography\n   One family, used with conviction: Avenir Next. Weight does the\n   hierarchy; we never need a second face. Mono only for hex / code.\n   ============================================================ */\n\n:root {\n  /* ---- Families ---- */\n  --font-sans: \"Avenir Next\", Avenir, \"Nunito Sans\", Montserrat, \"Segoe UI\", -apple-system, BlinkMacSystemFont, sans-serif;\n  --font-mono: ui-monospace, \"SF Mono\", SFMono-Regular, Menlo, Consolas, monospace;\n\n  /* ---- Weights (real cuts: 400 / 500 / 600; 700-800 map to DemiBold) ---- */\n  --fw-regular: 400;   /* @kind font */\n  --fw-medium: 500;    /* @kind font */\n  --fw-demibold: 600;  /* @kind font */\n  --fw-heavy: 800;     /* @kind font */ /* display — synth from DemiBold until a Heavy cut is licensed */\n\n  /* ---- Type scale (px) ---- */\n  --fs-display: 72px;   /* hero / title slides */\n  --fs-h1: 48px;\n  --fs-h2: 36px;\n  --fs-h3: 28px;\n  --fs-h4: 22px;\n  --fs-title: 20px;\n  --fs-body-lg: 18px;\n  --fs-body: 17px;      /* default reading size */\n  --fs-sm: 15px;\n  --fs-caption: 14px;\n  --fs-eyebrow: 13px;\n  --fs-micro: 12px;\n\n  /* Fluid display for hero contexts */\n  --fs-display-fluid: clamp(44px, 8vw, 96px); /* @kind font */\n  --fs-h2-fluid: clamp(28px, 4vw, 40px); /* @kind font */\n\n  /* ---- Line heights ---- */\n  --lh-display: 1.02; /* @kind font */\n  --lh-tight: 1.1;    /* @kind font */\n  --lh-snug: 1.25;    /* @kind font */\n  --lh-body: 1.6;     /* @kind font */\n\n  /* ---- Letter spacing ---- */\n  --track-display: -0.02em; /* @kind font */ /* tighten big Avenir */\n  --track-heading: -0.01em; /* @kind font */\n  --track-normal: 0;        /* @kind font */\n  --track-label: 0.14em;    /* @kind font */ /* lower-third labels */\n  --track-eyebrow: 0.22em;  /* @kind font */ /* caps eyebrows */\n}\n<\u002Fstyle>\n  <style>/* ============================================================\n   MLE Path — Spacing, radii, elevation, motion\n   The system is flat and paper-like: cards lean on a 1px silver\n   border, not heavy shadows. Shadows are reserved for things that\n   genuinely float (menus, toasts, dialogs).\n   ============================================================ */\n\n:root {\n  /* ---- Spacing scale (4px base) ---- */\n  --space-0: 0;\n  --space-1: 4px;\n  --space-2: 8px;\n  --space-3: 12px;\n  --space-4: 16px;\n  --space-5: 20px;\n  --space-6: 24px;\n  --space-7: 28px;\n  --space-8: 32px;\n  --space-10: 40px;\n  --space-12: 48px;\n  --space-16: 64px;\n  --space-20: 80px;\n  --space-24: 96px;\n\n  /* Common rhythm aliases */\n  --gutter: 28px;        /* horizontal page padding (guide .wrap) */\n  --section-y: 84px;     /* vertical section rhythm */\n  --content-max: 1060px; /* reading column max width */\n\n  /* ---- Radii ---- */\n  --radius-xs: 4px;\n  --radius-sm: 6px;\n  --radius-md: 10px;     /* default card */\n  --radius-lg: 12px;\n  --radius-xl: 16px;\n  --radius-pill: 999px;\n\n  /* ---- Borders ---- */\n  --border-hairline: 1px solid var(--border-default);\n  --border-soft-rule: 1px solid var(--border-soft);\n\n  /* ---- Elevation ---- */\n  --shadow-none: none;\n  --shadow-sm: 0 1px 2px rgba(11, 11, 11, 0.06);\n  --shadow-md: 0 6px 20px rgba(11, 11, 11, 0.08);\n  --shadow-pop: 0 12px 40px rgba(11, 11, 11, 0.14);\n  --shadow-focus: 0 0 0 3px var(--blue-100);\n\n  /* ---- Motion ---- */\n  --ease-standard: cubic-bezier(0.2, 0, 0.2, 1); /* @kind other */\n  --ease-out: cubic-bezier(0.16, 1, 0.3, 1); /* \u002Fdiv>\n          <div style=\"font-size:13px; color:var(--graphite); line-height:1.4; margin-top:3px;\">Those people don't follow the rules.<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"width:2px; height:34px; margin:0 auto; border-left:2px dashed var(--silver);\"><\u002Fdiv>\n      <\u002Fdiv>\n\n      <div style=\"display:grid; grid-template-columns:repeat(3,1fr); gap:20px; margin-bottom:14px;\">\n        <sc-for list=\"{{ ladders }}\" as=\"ladder\" hint-placeholder-count=\"3\">\n          <div style=\"display:flex; align-items:center; gap:10px;\">\n            <span style=\"width:26px; height:26px; flex:none; display:grid; place-items:center; background:var(--blue-500); color:#fff; border-radius:6px; font-weight:600; font-size:14px;\">{{ ladder.n }}<\u002Fspan>\n            <span style=\"font-size:13px; font-weight:600; letter-spacing:0.12em; text-transform:uppercase; color:var(--ink-700); line-height:1.15;\">{{ ladder.label }}<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n\n      <div style=\"display:grid; grid-template-columns:repeat(3,1fr); gap:20px; height:376px;\">\n        <sc-for list=\"{{ ladders }}\" as=\"ladder\" hint-placeholder-count=\"3\">\n          <div style=\"display:flex; flex-direction:column; gap:8px; height:100%;\">\n            <sc-for list=\"{{ ladder.signal }}\" as=\"rung\" hint-placeholder-count=\"4\">\n              <button onclick=\"{{ rung.on }}\" style=\"{{ rung.st }}\" style-hover=\"border-color:var(--blue-400);\">\n                <span style=\"width:3px; align-self:stretch; flex:none; border-radius:3px; background:var(--blue-500);\"><\u002Fspan>\n                <span style=\"flex:1; text-align:left;\">{{ rung.t }}<\u002Fspan>\n              <\u002Fbutton>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n\n      <div style=\"position:relative; display:flex; align-items:center; justify-content:center; margin:18px 0 16px;\">\n        <div style=\"position:absolute; left:0; right:0; top:50%; height:0; border-top:2px dashed var(--pink-500);\"><\u002Fdiv>\n        <span style=\"position:relative; background:var(--surface-page); padding:4px 16px; color:var(--pink-600); font-size:12px; font-weight:600; letter-spacing:0.18em; text-transform:uppercase;\">Below this line: noise<\u002Fspan>\n      <\u002Fdiv>\n\n      <div style=\"display:grid; grid-template-columns:repeat(3,1fr); gap:20px;\">\n        <sc-for list=\"{{ ladders }}\" as=\"ladder\" hint-placeholder-count=\"3\">\n          <button onclick=\"{{ ladder.noise.on }}\" style=\"{{ ladder.noise.st }}\" style-hover=\"border-color:var(--pink-500);\">\n            <span style=\"width:3px; align-self:stretch; flex:none; border-radius:3px; background:var(--pink-500);\"><\u002Fspan>\n            <span style=\"flex:1; text-align:left;\">{{ ladder.noise.t }}<\u002Fspan>\n          <\u002Fbutton>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n\n    <\u002Fdiv>\n\n    <div style=\"margin-top:30px;\">\n      <sc-if value=\"{{ verdict }}\" hint-placeholder-val=\"{{ true }}\">\n        <div style=\"{{ verdict.cardStyle }}\">\n          <div style=\"{{ verdict.ebStyle }}\">{{ verdict.eyebrow }}<\u002Fdiv>\n          <div style=\"font-size:20px; font-weight:600; color:var(--ink-700); line-height:1.25; margin-bottom:6px;\">{{ verdict.rung }}<\u002Fdiv>\n          <div style=\"font-size:17px; line-height:1.55; color:var(--graphite); max-width:760px;\">{{ verdict.text }}<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n      <sc-if value=\"{{ noVerdict }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"border:1px dashed var(--silver); border-radius:10px; padding:22px 24px; text-align:center; color:var(--ink-muted); font-size:16px;\">Tap any rung to reveal its verdict.<\u002Fdiv>\n      <\u002Fsc-if>\n    <\u002Fdiv>\n\n    <p style=\"text-align:center; max-width:640px; margin:34px auto 0; font-size:16px; line-height:1.55; color:var(--ink-700); font-weight:500;\">The higher the rung, the harder it is to fake. That's exactly why it works.<\u002Fp>\n\n  <\u002Fdiv>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  state = { selected: null };\n\n  data = [\n    { n: 1, label: 'Who vouches for you',\n      signal: [\n        { t: 'Former boss', v: 'Has seen you ship under pressure. One message from them outweighs your entire resume.' },\n        { t: 'Former teammate', v: 'Worked beside you every day. They can speak to how you actually operate, not just what you claim.' },\n        { t: 'Coworker from a sister team', v: 'Knows you by reputation and a shared project or two. Real, but they are vouching for the rumor of you.' },\n      ],\n      noise: { t: 'Strangers on LinkedIn (\"Hi dear, can you refer me\")', v: 'A referral from someone who has never seen you work is worth exactly what it cost them: nothing.' },\n    },\n    { n: 2, label: \"What you've built\",\n      signal: [\n        { t: 'Shipped project at work', v: 'Real users, real constraints, real stakes. Proof you can finish, not just start.' },\n        { t: 'Well-known open source', v: 'Thousands depend on your code and you kept it alive. Public, verifiable credibility.' },\n        { t: 'Your own product with real users', v: 'You built it, shipped it, and someone chose to use it. End-to-end ownership is rare.' },\n        { t: 'Lesser-known open source', v: 'Shows initiative and craft even if few have seen it. Depth over reach.' },\n        { t: 'Freelance', v: 'You delivered for paying clients. Solid — though the scope and rigor are hard for outsiders to verify.' },\n      ],\n      noise: { t: 'Portfolio of toy demos', v: 'Anyone can prompt their way to a shiny repo in a weekend — hiring managers know it.' },\n    },\n    { n: 3, label: 'Where you show up',\n      signal: [\n        { t: 'Conferences (industrial & academic)', v: 'The densest room of opportunity there is — recruiters, speakers, movers and shakers. The asterisk: it only pays off if you work the hallway track, not just attend the talks.' },\n        { t: 'Coffee with a former colleague', v: 'One deep referral from a single colleague beats ten shallow ones — and colleagues help in a myriad of other ways. Besides, it is good to have friends.' },\n        { t: 'Meetups', v: 'Usually too short to make a meaningful connection. Still beats doing nothing.' },\n      ],\n      noise: { t: 'Another 200 cold applications', v: \"Shouting into the same void louder won't change the echo. Volume isn't a strategy.\" },\n    },\n  ];\n\n  wild = { t: 'Cheat code: someone high up', v: \"A director who already wants you doesn't check references — they override them. Rank doesn't apply when the person deciding is the rule.\" };\n\n  signalStyle(sel) {\n    return {\n      flex: '1 1 0', minHeight: 0, display: 'flex', alignItems: 'center', gap: '10px',\n      padding: '0 12px 0 8px', width: '100%',\n      background: sel ? 'var(--blue-50)' : 'var(--white)',\n      border: sel ? '2px solid var(--blue-500)' : '1px solid var(--silver)',\n      borderRadius: '8px', cursor: 'pointer',\n      boxShadow: sel ? 'var(--shadow-md)' : 'none',\n      transition: 'background 160ms cubic-bezier(0.2,0,0.2,1), border-color 160ms cubic-bezier(0.2,0,0.2,1), box-shadow 160ms cubic-bezier(0.2,0,0.2,1)',\n      color: 'var(--ink-700)', fontFamily: 'var(--font-sans)',\n      fontWeight: sel ? 600 : 500, fontSize: '14.5px', lineHeight: 1.2,\n    };\n  }\n\n  noiseStyle(sel) {\n    return {\n      display: 'flex', alignItems: 'center', gap: '10px', minHeight: '60px',\n      padding: '10px 12px 10px 8px', width: '100%',\n      background: sel ? 'var(--pink-50)' : 'var(--surface-sunken)',\n      border: sel ? '2px solid var(--pink-500)' : '1px dashed var(--silver)',\n      borderRadius: '8px', cursor: 'pointer',\n      transition: 'background 160ms cubic-bezier(0.2,0,0.2,1), border-color 160ms cubic-bezier(0.2,0,0.2,1)',\n      color: sel ? 'var(--ink-700)' : 'var(--graphite)', fontFamily: 'var(--font-sans)',\n      fontWeight: 500, fontSize: '14px', lineHeight: 1.25,\n    };\n  }\n\n  wildStyle(sel) {\n    return {\n      display: 'block', width: '100%', textAlign: 'left', cursor: 'pointer',\n      background: sel ? 'var(--pink-50)' : 'var(--white)',\n      border: sel ? '2px solid var(--pink-500)' : '2px dashed var(--pink-500)',\n      borderRadius: '10px', padding: '12px 14px',\n      boxShadow: 'var(--shadow-sm)',\n      transition: 'box-shadow 160ms cubic-bezier(0.2,0,0.2,1), background 160ms cubic-bezier(0.2,0,0.2,1)',\n      fontFamily: 'var(--font-sans)',\n    };\n  }\n\n  select(uid) {\n    this.setState(s => ({ selected: s.selected === uid ? null : uid }));\n  }\n\n  renderVals() {\n    const sel = this.state.selected;\n    let verdict = null;\n\n    const ladders = this.data.map((L, li) => {\n      const signal = L.signal.map((r, ri) => {\n        const uid = 'l' + li + '-s' + ri;\n        const s = sel === uid;\n        if (s) verdict = { eyebrow: L.label, rung: r.t, text: r.v, tier: 'signal' };\n        return { t: r.t, st: this.signalStyle(s), on: () => this.select(uid) };\n      });\n      const nuid = 'l' + li + '-n';\n      const ns = sel === nuid;\n      if (ns) verdict = { eyebrow: L.label + ' · below the line', rung: L.noise.t, text: L.noise.v, tier: 'noise' };\n      const noise = { t: L.noise.t, st: this.noiseStyle(ns), on: () => this.select(nuid) };\n      return { n: L.n, label: L.label, signal, noise };\n    });\n\n    const ws = sel === 'wild';\n    if (ws) verdict = { eyebrow: 'Wildcard · off the ladder', rung: this.wild.t, text: this.wild.v, tier: 'wild' };\n    const wildcard = { st: this.wildStyle(ws), on: () => this.select('wild') };\n\n    if (verdict) {\n      const accent = verdict.tier === 'signal' ? 'var(--blue-500)' : 'var(--pink-500)';\n      verdict.cardStyle = {\n        background: 'var(--white)', border: '1px solid var(--silver)',\n        borderTop: '3px solid ' + accent, borderRadius: '10px', padding: '22px 24px',\n        boxShadow: 'var(--shadow-sm)',\n      };\n      verdict.ebStyle = {\n        fontSize: '12px', fontWeight: 600, letterSpacing: '0.14em', textTransform: 'uppercase',\n        color: accent, marginBottom: '8px',\n      };\n    }\n\n    return { ladders, wildcard, verdict, noVerdict: !verdict };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
